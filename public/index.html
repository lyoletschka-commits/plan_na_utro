<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Утренний план</title>
  <meta name="theme-color" content="#F2F2F7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#F2F2F7;--card:#fff;--sep:rgba(60,60,67,.12);
      --blue:#007AFF;--green:#34C759;--red:#FF3B30;--orange:#FF9500;
      --text:#000;--t2:rgba(60,60,67,.6);--t3:rgba(60,60,67,.28);
      --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;background:var(--bg);color:var(--text);
      font-family:-apple-system,'SF Pro Text',sans-serif;
      overflow:hidden;-webkit-font-smoothing:antialiased}
    #app{height:100%;display:flex;flex-direction:column}

    /* ═══════════════ LOGIN ═══════════════ */
    #login{flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:24px;padding:40px 28px;
      background:linear-gradient(160deg,#EBF4FF 0%,#F2F2F7 70%)}
    .l-icon{width:88px;height:88px;background:linear-gradient(145deg,#007AFF,#5856D6);
      border-radius:24px;display:flex;align-items:center;justify-content:center;
      font-size:46px;box-shadow:0 8px 28px rgba(0,122,255,.22)}
    .l-title{font-size:26px;font-weight:700;letter-spacing:-.3px;text-align:center}
    .l-sub{font-size:14px;color:var(--t2);text-align:center;line-height:1.55;max-width:270px}
    .l-hint{font-size:12px;color:var(--t3);text-align:center;max-width:250px;line-height:1.5}
    .tg-btn{display:flex;align-items:center;gap:10px;background:var(--blue);color:#fff;
      border:none;cursor:pointer;padding:13px 26px;border-radius:14px;font-size:15px;
      font-weight:600;font-family:inherit;box-shadow:0 3px 14px rgba(0,122,255,.28);
      transition:transform .15s}
    .tg-btn:active{transform:scale(.97)}
    #step-wait{display:none;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:290px}
    .wait-card{background:var(--card);border-radius:14px;padding:18px;
      box-shadow:0 2px 10px rgba(0,0,0,.06);width:100%;text-align:center}
    .wait-title{font-size:16px;font-weight:600;margin-bottom:5px}
    .wait-sub{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:12px}
    .dl-btn{display:flex;align-items:center;justify-content:center;gap:9px;
      background:var(--blue);color:#fff;text-decoration:none;
      padding:11px 18px;border-radius:11px;font-size:14px;font-weight:600;
      box-shadow:0 2px 10px rgba(0,122,255,.22)}
    .poll-row{display:flex;align-items:center;gap:7px;color:var(--t3);font-size:12px}
    .cancel{background:none;border:none;color:var(--t3);font-size:12px;
      cursor:pointer;font-family:inherit}

    /* ═══════════════ MAIN ═══════════════ */
    #main{flex:1;display:none;flex-direction:column;overflow:hidden;background:var(--bg)}

    /* ── Top bar ── */
    .topbar{
      background:var(--card);border-bottom:1px solid var(--sep);
      padding:calc(var(--st) + 10px) 14px 10px;
      display:flex;align-items:center;gap:10px;flex-shrink:0;
    }
    .app-logo{font-size:20px;margin-right:2px}
    .week-nav{display:flex;align-items:center;gap:6px;flex:1;justify-content:center}
    .nav-btn{width:30px;height:30px;border:none;background:var(--bg);border-radius:50%;
      cursor:pointer;font-size:16px;color:var(--t2);display:flex;align-items:center;
      justify-content:center;transition:background .15s}
    .nav-btn:active{background:#E0E0E5}
    #week-label{font-size:14px;font-weight:600;color:var(--text);min-width:140px;text-align:center}
    .today-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;
      padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
      white-space:nowrap;flex-shrink:0}
    .avatar{width:30px;height:30px;border-radius:50%;overflow:hidden;background:#E5E5EA;
      display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
      border:1px solid var(--sep)}
    .avatar img{width:100%;height:100%;object-fit:cover}

    /* ── Скролл-область ── */
    .main-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .main-scroll::-webkit-scrollbar{display:none}

    /* ═══════════════ WEEK COLUMNS VIEW ═══════════════ */
    .week-section{background:var(--card);margin:10px 10px 0;border-radius:14px;
      box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}

    .week-cols{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;
      scroll-snap-type:x mandatory}
    .week-cols::-webkit-scrollbar{display:none}

    .day-col{
      flex:0 0 calc(100%/3.5);min-width:95px;
      border-right:1px solid var(--sep);
      scroll-snap-align:start;
      display:flex;flex-direction:column;
    }
    .day-col:last-child{border-right:none}

    .col-hdr{
      padding:8px 6px 6px;text-align:center;border-bottom:1px solid var(--sep);
      cursor:pointer;user-select:none;transition:background .15s;flex-shrink:0;
    }
    .col-hdr:active{background:var(--bg)}
    .col-name{font-size:10px;font-weight:700;color:var(--t3);
      text-transform:uppercase;letter-spacing:.5px}
    .col-num{width:28px;height:28px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:16px;font-weight:600;color:var(--text);
      margin:3px auto 0;transition:all .2s cubic-bezier(.34,1.56,.64,1)}

    .day-col.is-today .col-num{background:var(--blue);color:#fff}
    .day-col.is-selected:not(.is-today) .col-num{background:rgba(0,122,255,.12);color:var(--blue)}
    .day-col.is-selected{background:rgba(0,122,255,.03)}

    .col-tasks{padding:6px 5px 8px;flex:1}

    .col-task{
      background:var(--card);border-radius:7px;padding:5px 7px;margin-bottom:4px;
      border-left:3px solid var(--blue);
      box-shadow:0 1px 3px rgba(0,0,0,.07);cursor:pointer;
      transition:opacity .2s;
      animation:fadeIn .2s ease both;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    .col-task:active{opacity:.7}
    .col-task.done{opacity:.35;border-left-color:var(--green)}
    .col-task.done .ct-text{text-decoration:line-through}
    .ct-text{font-size:11px;font-weight:500;line-height:1.35;color:var(--text)}
    .ct-time{font-size:10px;color:var(--blue);font-weight:700;margin-top:2px}

    .col-empty{padding:12px 6px;text-align:center;
      font-size:11px;color:var(--t3);font-style:italic}

    /* ═══════════════ MONTH MINI-CAL ═══════════════ */
    .month-section{margin:10px 10px 0;background:var(--card);
      border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}

    .month-hdr{display:flex;align-items:center;justify-content:space-between;
      padding:10px 14px 8px;border-bottom:1px solid var(--sep)}
    .month-title{font-size:14px;font-weight:700;color:var(--text)}
    .m-nav{width:28px;height:28px;border:none;background:var(--bg);border-radius:50%;
      cursor:pointer;font-size:15px;color:var(--t2);display:flex;align-items:center;
      justify-content:center}
    .m-nav:active{background:#E0E0E5}

    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);
      padding:4px 8px 10px;gap:1px}
    .cal-dn{font-size:10px;font-weight:600;color:var(--t3);text-align:center;
      padding:4px 0;text-transform:uppercase;letter-spacing:.3px}

    .cal-day{
      display:flex;flex-direction:column;align-items:center;padding:3px 1px;
      cursor:pointer;border-radius:8px;transition:background .1s;user-select:none;
    }
    .cal-day:active{background:rgba(0,0,0,.05)}
    .cd-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:13px;font-weight:500;color:var(--text)}
    .cd-dot{width:4px;height:4px;border-radius:50%;margin-top:1px;
      background:transparent;transition:background .2s}

    .cal-day.other-month .cd-num{color:var(--t3)}
    .cal-day.is-today .cd-num{background:var(--blue);color:#fff;font-weight:700}
    .cal-day.is-selected:not(.is-today) .cd-num{background:rgba(0,122,255,.13);color:var(--blue);font-weight:600}
    .cal-day.has-tasks .cd-dot{background:var(--blue)}
    .cal-day.is-today.has-tasks .cd-dot{background:#fff}
    .cal-day.is-selected.has-tasks:not(.is-today) .cd-dot{background:var(--blue)}

    /* ═══════════════ MONTHS LIST ═══════════════ */
    .months-section{margin:10px 10px 10px;background:var(--card);
      border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}

    .months-sec-title{font-size:11px;font-weight:700;color:var(--t3);
      text-transform:uppercase;letter-spacing:.6px;padding:10px 14px 6px}

    .month-row{
      display:flex;align-items:center;padding:10px 14px;
      border-top:1px solid var(--sep);cursor:pointer;transition:background .15s;
    }
    .month-row:first-of-type{border-top:none}
    .month-row:active{background:var(--bg)}
    .month-row.is-current .mr-name{color:var(--blue);font-weight:700}
    .mr-name{font-size:14px;font-weight:500;flex:1}
    .mr-count{font-size:12px;color:var(--t3);margin-right:6px}
    .mr-arrow{font-size:12px;color:var(--t3)}

    /* ═══════════════ BOTTOM BAR ═══════════════ */
    .bar{padding:9px 12px calc(var(--sb) + 9px);background:var(--card);
      border-top:1px solid var(--sep);flex-shrink:0}
    .rec-bar{display:none;align-items:center;gap:9px;padding:7px 11px;
      background:rgba(255,59,48,.07);border-radius:9px;margin-bottom:7px;
      border:1px solid rgba(255,59,48,.15)}
    .rec-bar.on{display:flex}
    .rec-dot{width:6px;height:6px;border-radius:50%;background:var(--red);
      animation:blink 1s ease infinite;flex-shrink:0}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .rec-txt{font-size:12px;color:var(--red);font-weight:600;flex:1}
    .rec-time{font-size:12px;color:var(--red);font-variant-numeric:tabular-nums}
    .rec-stop{background:rgba(255,59,48,.12);border:none;border-radius:6px;
      color:var(--red);font-size:11px;font-weight:700;padding:3px 9px;cursor:pointer;font-family:inherit}
    .inp-row{display:flex;gap:8px;align-items:flex-end}
    .mic{width:38px;height:38px;border-radius:50%;background:#E5E5EA;border:none;
      display:flex;align-items:center;justify-content:center;cursor:pointer;
      flex-shrink:0;color:var(--t2);transition:all .2s cubic-bezier(.34,1.56,.64,1);position:relative}
    .mic.on{background:var(--red);color:#fff;transform:scale(1.06)}
    .mic.on::after{content:'';position:absolute;inset:-5px;border-radius:50%;
      border:2px solid var(--red);animation:rpl 1.1s ease-out infinite}
    @keyframes rpl{0%{opacity:.5;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}
    .inp-wrap{flex:1;background:#EBEBEF;border-radius:18px;padding:8px 13px;
      display:flex;align-items:flex-end;gap:7px;transition:background .15s}
    .inp-wrap:focus-within{background:#E0E0E5}
    #tinp{flex:1;background:none;border:none;outline:none;color:var(--text);
      font-size:14px;font-family:inherit;resize:none;max-height:100px;
      line-height:1.45;min-height:20px}
    #tinp::placeholder{color:var(--t3)}
    .send{width:26px;height:26px;border-radius:50%;background:var(--blue);border:none;
      display:flex;align-items:center;justify-content:center;cursor:pointer;
      flex-shrink:0;opacity:.3;transition:opacity .2s,transform .15s}
    .send.on{opacity:1}
    .send:active{transform:scale(.9)}

    /* ═══════════════ ТОСТ ═══════════════ */
    .toast{position:fixed;top:calc(var(--st) + 50px);left:50%;
      transform:translateX(-50%) translateY(-10px);
      background:rgba(50,50,52,.94);color:#fff;
      backdrop-filter:blur(16px);border-radius:18px;
      padding:8px 16px;font-size:13px;font-weight:500;
      opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events:none;z-index:999;white-space:nowrap;
      max-width:calc(100vw - 32px);text-align:center}
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

    .spin{width:13px;height:13px;border:2px solid rgba(0,0,0,.12);
      border-top-color:var(--blue);border-radius:50%;
      animation:rot .75s linear infinite;display:inline-block}
    @keyframes rot{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="app">

<!-- ══ ЭКРАН ВХОДА ══ -->
<div id="login">
  <div class="l-icon">🌅</div>
  <div style="text-align:center">
    <div class="l-title">Утренний план</div>
    <div class="l-sub" style="margin-top:7px">Голосом или текстом — разберу твой день по часам</div>
  </div>
  <div id="step-start">
    <button class="tg-btn" onclick="startAuth()">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.94 8.19l-2.02 9.52c-.15.67-.54.83-1.09.52l-3-2.21-1.45 1.39c-.16.16-.3.3-.61.3l.22-3.08 5.6-5.06c.24-.22-.05-.34-.38-.12L6.27 14.4l-2.97-.93c-.64-.2-.66-.64.14-.95l11.6-4.47c.53-.2 1 .13.9.14z"/>
      </svg>
      Войти через Telegram
    </button>
  </div>
  <div id="step-wait">
    <div class="wait-card">
      <div class="wait-title">Подтверди вход</div>
      <div class="wait-sub">Открой бота в Telegram и нажми Start</div>
      <a id="deeplink-btn" class="dl-btn" href="#" target="_blank">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.94 8.19l-2.02 9.52c-.15.67-.54.83-1.09.52l-3-2.21-1.45 1.39c-.16.16-.3.3-.61.3l.22-3.08 5.6-5.06c.24-.22-.05-.34-.38-.12L6.27 14.4l-2.97-.93c-.64-.2-.66-.64.14-.95l11.6-4.47c.53-.2 1 .13.9.14z"/>
        </svg>
        Открыть @plan_na_utro_bot
      </a>
    </div>
    <div class="poll-row"><span class="spin"></span><span>Жду подтверждения…</span></div>
    <button class="cancel" onclick="cancelAuth()">Отмена</button>
  </div>
  <div class="l-hint">Задачи синхронизируются с <strong>@plan_na_utro_bot</strong></div>
</div>

<!-- ══ ГЛАВНЫЙ ЭКРАН ══ -->
<div id="main">
  <!-- Top bar -->
  <div class="topbar">
    <span class="app-logo">🌅</span>
    <div class="week-nav">
      <button class="nav-btn" onclick="shiftWeek(-1)">‹</button>
      <span id="week-label">—</span>
      <button class="nav-btn" onclick="shiftWeek(1)">›</button>
    </div>
    <button class="today-btn" onclick="goToday()">Сегодня</button>
    <div class="avatar" id="uavatar">👤</div>
  </div>

  <!-- Скролл-область -->
  <div class="main-scroll" id="main-scroll">

    <!-- Week columns -->
    <div class="week-section">
      <div class="week-cols" id="week-cols"></div>
    </div>

    <!-- Month mini-calendar -->
    <div class="month-section">
      <div class="month-hdr">
        <button class="m-nav" onclick="shiftMonth(-1)">‹</button>
        <span class="month-title" id="month-title">Июнь 2026</span>
        <button class="m-nav" onclick="shiftMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Months list -->
    <div class="months-section" id="months-section">
      <div class="months-sec-title" id="months-year-title">2026</div>
      <div id="months-list"></div>
    </div>

    <div style="height:8px"></div>
  </div><!-- /main-scroll -->

  <!-- Bottom bar -->
  <div class="bar">
    <div class="rec-bar" id="recbar">
      <div class="rec-dot"></div>
      <span class="rec-txt">Запись…</span>
      <span class="rec-time" id="rectm">0:00</span>
      <button class="rec-stop" onclick="stopRec()">Стоп</button>
    </div>
    <div class="inp-row">
      <button class="mic" id="micbtn" onclick="toggleRec()">
        <svg width="17" height="21" viewBox="0 0 18 22" fill="currentColor">
          <rect x="5" y="0" width="8" height="13" rx="4"/>
          <path d="M1 9c0 4.4 3.6 8 8 8s8-3.6 8-8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          <line x1="9" y1="17" x2="9" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="6" y1="21" x2="12" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="inp-wrap">
        <textarea id="tinp" rows="1" placeholder="Что планируешь?"
          oninput="onInp(this)" onkeydown="onKD(event)"></textarea>
        <button class="send" id="sendbtn" onclick="sendText()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
            <path d="M12 20V4M12 4L5 11M12 4L19 11"
              stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div><!-- /main -->
</div><!-- /app -->

<div class="toast" id="toast"></div>

<script>
'use strict';

/* ═══════════ STATE ═══════════ */
let TOKEN = localStorage.getItem('tok') || '';
let USER  = JSON.parse(localStorage.getItem('usr') || 'null');
let selectedDay = todayStr();
let weekStart   = getWeekStart(selectedDay);
let viewMonth   = selectedDay.slice(0,7);   // YYYY-MM для мини-кал
let viewYear    = selectedDay.slice(0,4);   // YYYY для списка месяцев

// Кэш задач: { 'YYYY-MM-DD': Task[] }
const cache = {};
// Мета: { 'YYYY-MM-DD': {total,done} }
const meta  = {};

let mr=null, chunks=[], recTmr=null, recSec=0, busy=false;
let pollTimer=null, authToken=null;

/* ═══════════ DATE UTILS ═══════════ */

// Форматируем дату как YYYY-MM-DD в LOCAL timezone (не UTC!)
function localDateStr(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function todayStr(){ return localDateStr(new Date()); }

function getWeekStart(d){
  const dt=new Date(d+'T12:00:00');
  const diff=(dt.getDay()+6)%7;
  dt.setDate(dt.getDate()-diff);
  return localDateStr(dt);
}

function addDays(d,n){
  const dt=new Date(d+'T12:00:00');
  dt.setDate(dt.getDate()+n);
  return localDateStr(dt);
}

function getWeekDays(ws){
  return Array.from({length:7},(_,i)=>addDays(ws,i));
}

function weekLabel(ws){
  const days=getWeekDays(ws);
  const s=new Date(days[0]+'T12:00:00');
  const e=new Date(days[6]+'T12:00:00');
  const mn=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  if(s.getMonth()===e.getMonth())
    return `${s.getDate()}–${e.getDate()} ${mn[s.getMonth()]} ${s.getFullYear()}`;
  return `${s.getDate()} ${mn[s.getMonth()]} – ${e.getDate()} ${mn[e.getMonth()]}`;
}

function monthStr(ym){ // YYYY-MM → 'Июнь 2026'
  const [y,m]=ym.split('-');
  const names=['Январь','Февраль','Март','Апрель','Май','Июнь',
    'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  return names[+m-1]+' '+y;
}

function monthDays(ym){ // все дни месяца + отступы из соседних
  const [y,m]=ym.split('-').map(Number);
  // Используем 12:00 чтобы избежать проблем с летним временем
  const first=new Date(y,m-1,1,12,0,0);
  const lastDay=new Date(y,m,0).getDate();
  const startDow=(first.getDay()+6)%7; // 0=Пн
  const days=[];
  // предыдущий месяц
  for(let i=startDow;i>0;i--){
    const dt=new Date(y,m-1,1-i,12,0,0);
    days.push({str:localDateStr(dt),cur:false});
  }
  // текущий месяц
  for(let d=1;d<=lastDay;d++){
    const dt=new Date(y,m-1,d,12,0,0);
    days.push({str:localDateStr(dt),cur:true});
  }
  // следующий месяц
  const rem=(7-days.length%7)%7;
  for(let i=1;i<=rem;i++){
    const dt=new Date(y,m,i,12,0,0);
    days.push({str:localDateStr(dt),cur:false});
  }
  return days;
}

/* ═══════════ AUTH ═══════════ */
window.addEventListener('load',()=>{
  if(TOKEN&&USER) showMain();
});

async function startAuth(){
  try{
    const r=await fetch('/api/auth-session',{method:'POST'});
    const d=await r.json();
    if(!d.token) throw new Error('no token');
    authToken=d.token;
    document.getElementById('step-start').style.display='none';
    document.getElementById('step-wait').style.display='flex';
    document.getElementById('deeplink-btn').href=`https://t.me/plan_na_utro_bot?start=auth_${d.token}`;
    pollTimer=setInterval(pollAuth,2000);
  }catch(e){toast('Ошибка: '+e.message)}
}
async function pollAuth(){
  if(!authToken) return;
  try{
    const r=await fetch('/api/auth-session?token='+authToken);
    const d=await r.json();
    if(d.pending) return;
    if(d.token){
      clearInterval(pollTimer);
      TOKEN=d.token;USER=d.user;
      localStorage.setItem('tok',TOKEN);
      localStorage.setItem('usr',JSON.stringify(USER));
      showMain();
    }
  }catch{}
}
function cancelAuth(){
  clearInterval(pollTimer);authToken=null;
  document.getElementById('step-wait').style.display='none';
  document.getElementById('step-start').style.display='block';
}

/* ═══════════ SHOW MAIN ═══════════ */
function showMain(){
  document.getElementById('login').style.display='none';
  document.getElementById('main').style.display='flex';
  const av=document.getElementById('uavatar');
  if(USER.photo_url) av.innerHTML=`<img src="${USER.photo_url}" alt="">`;
  else av.textContent=(USER.first_name||'?')[0].toUpperCase();
  // Загрузить год → потом рендерить всё
  loadYear(viewYear).then(()=>{
    renderAll();
  });
}

/* ═══════════ DATA LOADING ═══════════ */
async function apiCall(method,path,body){
  const opts={method,headers:{Authorization:'Bearer '+TOKEN}};
  if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  const r=await fetch(path,opts);
  if(r.status===401){localStorage.clear();location.reload();return null;}
  return r.json();
}

async function loadYear(year){
  const d=await apiCall('GET',`/api/tasks?year=${year}`);
  if(!d?.tasks) return;
  // Очистить мета для года
  d.tasks.forEach(t=>{
    if(!meta[t.day]) meta[t.day]={total:0,done:0};
    meta[t.day].total++;
    if(t.done) meta[t.day].done++;
    // Кэшируем задачи по дням
    if(!cache[t.day]) cache[t.day]=[];
    // Добавляем если не дубль
    if(!cache[t.day].find(x=>x.id===t.id)) cache[t.day].push(t);
  });
  // Заполнить cache для дней с нулём задач (чтобы знать что загружено)
  getWeekDays(weekStart).forEach(day=>{
    if(!cache[day]) cache[day]=[];
  });
}

async function ensureWeekLoaded(ws){
  const days=getWeekDays(ws);
  const missing=days.filter(d=>!(d in cache));
  if(!missing.length) return;
  const r=await apiCall('GET',`/api/tasks?week=true&days=${missing.join(',')}`);
  if(!r?.tasks) return;
  // Инициализировать пустые
  missing.forEach(d=>{ if(!cache[d]) cache[d]=[]; });
  r.tasks.forEach(t=>{
    if(!cache[t.day]) cache[t.day]=[];
    if(!cache[t.day].find(x=>x.id===t.id)) cache[t.day].push(t);
    if(!meta[t.day]) meta[t.day]={total:0,done:0};
    meta[t.day].total++;
    if(t.done) meta[t.day].done++;
  });
}

/* ═══════════ RENDER ALL ═══════════ */
function renderAll(){
  document.getElementById('week-label').textContent=weekLabel(weekStart);
  renderWeekCols();
  renderMonthCal();
  renderMonthsList();
}

/* ── Week columns ── */
function renderWeekCols(){
  const days=getWeekDays(weekStart);
  const today=todayStr();
  const dn=['пн','вт','ср','чт','пт','сб','вс'];
  let html='';
  days.forEach((day,i)=>{
    const dt=new Date(day+'T12:00:00');
    const isToday=day===today;
    const isSel=day===selectedDay;
    const tasks=(cache[day]||[]).slice().sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
    const cls=['day-col',isToday?'is-today':'',isSel?'is-selected':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" data-day="${day}">
      <div class="col-hdr" onclick="selectDay('${day}')">
        <div class="col-name">${dn[i]}</div>
        <div class="col-num">${dt.getDate()}</div>
      </div>
      <div class="col-tasks" id="ct-${day}">`;
    if(tasks.length===0){
      html+=`<div class="col-empty">—</div>`;
    } else {
      tasks.forEach((t,ti)=>{
        const done=t.done?'done':'';
        const timeHtml=t.time?`<div class="ct-time">${esc(t.time)}</div>`:'';
        html+=`<div class="col-task ${done}" data-day="${day}" data-idx="${ti+1}"
          style="animation-delay:${ti*.03}s"
          onclick="toggleTask('${day}',${ti+1})">
          <div class="ct-text">${esc(t.text)}</div>${timeHtml}
        </div>`;
      });
    }
    html+=`</div></div>`;
  });
  const wc=document.getElementById('week-cols');
  wc.innerHTML=html;
  // Прокрутить к выбранному дню
  setTimeout(()=>{
    const sel=wc.querySelector('.is-selected');
    if(sel) sel.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },50);
}

/* ── Month mini-calendar ── */
function renderMonthCal(){
  document.getElementById('month-title').textContent=monthStr(viewMonth);
  const today=todayStr();
  const days=monthDays(viewMonth);
  const dn=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let html=dn.map(d=>`<div class="cal-dn">${d}</div>`).join('');
  days.forEach(({str,cur})=>{
    const num=new Date(str+'T12:00:00').getDate();
    const m=meta[str];
    const hasTasks=!!(m&&m.total>0);
    const isToday=str===today;
    const isSel=str===selectedDay;
    const cls=['cal-day',!cur?'other-month':'',isToday?'is-today':'',
      isSel?'is-selected':'',hasTasks?'has-tasks':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="selectDay('${str}')">
      <div class="cd-num">${num}</div>
      <div class="cd-dot"></div>
    </div>`;
  });
  document.getElementById('cal-grid').innerHTML=html;
}

/* ── Months list ── */
function renderMonthsList(){
  const year=viewYear;
  document.getElementById('months-year-title').textContent=year;
  const mnames=['Январь','Февраль','Март','Апрель','Май','Июнь',
    'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const curM=todayStr().slice(0,7);
  let html='';
  for(let m=1;m<=12;m++){
    const ym=`${year}-${String(m).padStart(2,'0')}`;
    const isCur=ym===curM;
    // Посчитать задачи за месяц из мета
    let total=0;
    for(const [d,v] of Object.entries(meta)){
      if(d.startsWith(ym)) total+=v.total;
    }
    const cls='month-row'+(isCur?' is-current':'');
    const cnt=total?`${total} ${plural(total,'задача','задачи','задач')}`:'';
    html+=`<div class="${cls}" onclick="goToMonth('${ym}')">
      <span class="mr-name">${mnames[m-1]}</span>
      <span class="mr-count">${cnt}</span>
      <span class="mr-arrow">›</span>
    </div>`;
  }
  document.getElementById('months-list').innerHTML=html;
}

/* ═══════════ NAVIGATION ═══════════ */
function selectDay(day){
  selectedDay=day;
  weekStart=getWeekStart(day);
  viewMonth=day.slice(0,7);
  document.getElementById('week-label').textContent=weekLabel(weekStart);
  ensureWeekLoaded(weekStart).then(()=>{
    renderWeekCols();
    renderMonthCal();
  });
}

function shiftWeek(n){
  weekStart=addDays(weekStart,n*7);
  selectedDay=weekStart; // выбрать первый день недели
  viewMonth=weekStart.slice(0,7);
  document.getElementById('week-label').textContent=weekLabel(weekStart);
  ensureWeekLoaded(weekStart).then(()=>{
    renderWeekCols();
    renderMonthCal();
  });
}

function goToday(){
  selectedDay=todayStr();
  weekStart=getWeekStart(selectedDay);
  viewMonth=selectedDay.slice(0,7);
  ensureWeekLoaded(weekStart).then(()=>{
    renderAll();
    document.getElementById('main-scroll').scrollTo({top:0,behavior:'smooth'});
  });
}

function shiftMonth(n){
  const [y,m]=viewMonth.split('-').map(Number);
  let nm=m+n, ny=y;
  if(nm>12){nm=1;ny++;}
  if(nm<1){nm=12;ny--;}
  viewMonth=`${ny}-${String(nm).padStart(2,'0')}`;
  // Загрузить год если сменился
  if(String(ny)!==viewYear){
    viewYear=String(ny);
    loadYear(viewYear).then(()=>{renderMonthCal();renderMonthsList();});
  } else {
    renderMonthCal();
  }
}

function goToMonth(ym){
  viewMonth=ym;
  // Перейти к 1-му числу этого месяца
  selectDay(ym+'-01');
  renderMonthCal();
  renderMonthsList();
  document.getElementById('main-scroll').scrollTo({top:0,behavior:'smooth'});
}

/* ═══════════ TASK ACTIONS ═══════════ */
async function toggleTask(day,idx){
  if(busy) return;
  const tasks=cache[day]||[];
  const sorted=tasks.slice().sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  const t=sorted[idx-1];
  if(!t||t.done) return;
  busy=true;
  // Оптимистично
  const orig=cache[day].find(x=>x.id===t.id);
  if(orig) orig.done=true;
  if(meta[day]) meta[day].done++;
  renderWeekCols();
  const r=await apiCall('PATCH','/api/tasks',{taskNum:idx,day});
  busy=false;
  if(r?.tasks){
    cache[day]=r.tasks;
    meta[day]={total:r.tasks.length,done:r.tasks.filter(x=>x.done).length};
    renderWeekCols();
    renderMonthCal();
    renderMonthsList();
  }
}

/* ═══════════ INPUT ═══════════ */
function onInp(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
  document.getElementById('sendbtn').classList.toggle('on',el.value.trim().length>0);
}
function onKD(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();}}
async function sendText(){
  const el=document.getElementById('tinp');
  const text=el.value.trim();
  if(!text||busy) return;
  el.value='';el.style.height='auto';
  document.getElementById('sendbtn').classList.remove('on');
  await processInput(text,null);
}

/* ═══════════ RECORDING ═══════════ */
async function toggleRec(){
  if(mr&&mr.state==='recording') stopRec(); else startRec();
}
async function startRec(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    chunks=[];
    const mime=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ?'audio/webm;codecs=opus':'audio/webm';
    mr=new MediaRecorder(stream,{mimeType:mime});
    mr.ondataavailable=e=>chunks.push(e.data);
    mr.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      await processInput(null,new Blob(chunks,{type:mime}));
    };
    mr.start();
    document.getElementById('micbtn').classList.add('on');
    document.getElementById('recbar').classList.add('on');
    recSec=0;
    recTmr=setInterval(()=>{
      recSec++;
      const m=Math.floor(recSec/60),s=recSec%60;
      document.getElementById('rectm').textContent=m+':'+String(s).padStart(2,'0');
      if(recSec>=90) stopRec();
    },1000);
  }catch{toast('Нет доступа к микрофону 🎙');}
}
function stopRec(){
  if(mr) mr.stop();clearInterval(recTmr);
  document.getElementById('micbtn').classList.remove('on');
  document.getElementById('recbar').classList.remove('on');
}

/* ═══════════ PROCESS INPUT ═══════════ */
async function processInput(text,blob){
  if(busy) return;
  busy=true;
  toast(blob?'🎧 Распознаю…':'🤔 Разбираю задачи…');
  try{
    let body;
    if(blob){
      const ab=await blob.arrayBuffer();
      const bytes=new Uint8Array(ab);
      let bin='';
      for(let i=0;i<bytes.length;i+=8192)
        bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+8192));
      body={audioBase64:btoa(bin),mimeType:blob.type,day:selectedDay};
    } else {
      body={text,day:selectedDay};
    }
    const d=await apiCall('POST','/api/tasks',body);
    if(!d){busy=false;return;}
    if(d.error){toast('⚠️ '+d.error);busy=false;return;}
    if(d.transcribed) toast('📝 «'+d.transcribed.slice(0,55)+(d.transcribed.length>55?'…':'')+'»');
    else toast('✅ Задачи добавлены в '+formatDayShort(selectedDay));
    if(d.tasks){
      cache[selectedDay]=d.tasks;
      meta[selectedDay]={total:d.tasks.length,done:d.tasks.filter(x=>x.done).length};
      renderWeekCols();
      renderMonthCal();
      renderMonthsList();
    }
  }catch(e){toast('Ошибка: '+e.message);}
  busy=false;
}

function formatDayShort(day){
  const d=new Date(day+'T12:00:00');
  const mn=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return d.getDate()+' '+mn[d.getMonth()];
}

/* ═══════════ UTILS ═══════════ */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function plural(n,a,b,c){
  const m=n%100;
  if(m>=11&&m<=19) return c;
  const r=n%10;
  return r===1?a:(r>=2&&r<=4)?b:c;
}

let toastTmr;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove('on'),3000);
}
</script>
