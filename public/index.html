<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Утренний план</title>
  <meta name="theme-color" content="#F2F2F7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    :root{
      --bg:#F2F2F7;
      --bg2:#FFFFFF;
      --bg3:#E5E5EA;
      --card:#FFFFFF;
      --card-b:rgba(60,60,67,.12);
      --blue:#007AFF;
      --green:#34C759;
      --red:#FF3B30;
      --orange:#FF9500;
      --purple:#AF52DE;
      --text:#000000;
      --text2:rgba(60,60,67,.6);
      --text3:rgba(60,60,67,.3);
      --sep:rgba(60,60,67,.12);
      --st:env(safe-area-inset-top,0px);
      --sb:env(safe-area-inset-bottom,0px);
    }

    html,body{
      height:100%;background:var(--bg);color:var(--text);
      font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;
      overflow:hidden;-webkit-font-smoothing:antialiased
    }

    #app{height:100%;display:flex;flex-direction:column}

    /* ══════════════════════════════════
       ЭКРАН ВХОДА
    ══════════════════════════════════ */
    #login{
      flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:28px;padding:40px 32px;
      background:linear-gradient(160deg,#E8F4FD 0%,#F2F2F7 60%);
    }

    .l-icon{
      width:96px;height:96px;
      background:linear-gradient(145deg,#007AFF,#5856D6);
      border-radius:26px;display:flex;align-items:center;justify-content:center;
      font-size:50px;
      box-shadow:0 8px 32px rgba(0,122,255,.25),0 0 0 1px rgba(255,255,255,.6);
    }

    .l-title{font-size:28px;font-weight:700;letter-spacing:-.4px;text-align:center;color:var(--text)}
    .l-sub{font-size:15px;color:var(--text2);text-align:center;line-height:1.55;max-width:280px}
    .l-hint{font-size:13px;color:var(--text3);text-align:center;max-width:260px;line-height:1.5}

    .tg-login-btn{
      display:flex;align-items:center;gap:10px;
      background:#007AFF;color:#fff;border:none;cursor:pointer;
      padding:14px 28px;border-radius:14px;font-size:16px;font-weight:600;
      font-family:inherit;
      box-shadow:0 4px 16px rgba(0,122,255,.3);
      transition:transform .15s ease,box-shadow .15s ease;
    }
    .tg-login-btn:active{transform:scale(.97);box-shadow:0 2px 8px rgba(0,122,255,.2)}

    #step-wait{
      display:none;flex-direction:column;align-items:center;
      gap:16px;width:100%;max-width:300px
    }
    .wait-card{
      background:var(--card);border-radius:16px;padding:20px;
      box-shadow:0 2px 12px rgba(0,0,0,.06);width:100%;text-align:center
    }
    .wait-title{font-size:17px;font-weight:600;margin-bottom:6px}
    .wait-sub{font-size:14px;color:var(--text2);line-height:1.5}

    .deeplink-btn{
      display:flex;align-items:center;justify-content:center;gap:10px;
      background:#007AFF;color:#fff;text-decoration:none;
      padding:13px 20px;border-radius:12px;font-size:15px;font-weight:600;
      width:100%;box-shadow:0 3px 12px rgba(0,122,255,.25);
      transition:transform .15s ease;
    }
    .deeplink-btn:active{transform:scale(.97)}

    .polling-row{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:13px}

    .cancel-btn{
      background:none;border:none;color:var(--text3);font-size:13px;
      cursor:pointer;font-family:inherit;padding:4px 8px
    }

    /* ══════════════════════════════════
       ГЛАВНЫЙ ЭКРАН
    ══════════════════════════════════ */
    #main{flex:1;display:none;flex-direction:column;overflow:hidden;background:var(--bg)}

    /* ── Шапка ── */
    .hdr{
      background:var(--bg2);
      padding:calc(var(--st) + 12px) 16px 12px;
      border-bottom:1px solid var(--sep);
      flex-shrink:0;
    }

    .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

    .hdr-left{}
    .hdr-greet{font-size:12px;color:var(--text3);font-weight:500;letter-spacing:.2px}
    .hdr-name{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-top:1px}

    .avatar{
      width:36px;height:36px;border-radius:50%;overflow:hidden;
      background:var(--bg3);display:flex;align-items:center;justify-content:center;
      font-size:16px;flex-shrink:0;border:1.5px solid var(--card-b)
    }
    .avatar img{width:100%;height:100%;object-fit:cover}

    /* ── Неделя ── */
    .week-strip{
      display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;
    }
    .week-strip::-webkit-scrollbar{display:none}

    .day-pill{
      display:flex;flex-direction:column;align-items:center;gap:3px;
      padding:6px 10px;border-radius:12px;cursor:pointer;flex-shrink:0;
      transition:background .15s ease,color .15s ease;
      min-width:44px;
    }
    .day-pill:active{transform:scale(.95)}
    .day-pill .dp-name{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
    .day-pill .dp-num{font-size:17px;font-weight:600;color:var(--text)}
    .day-pill .dp-dot{width:5px;height:5px;border-radius:50%;background:transparent}

    .day-pill.has-tasks .dp-dot{background:var(--blue)}
    .day-pill.today .dp-num{color:var(--blue)}
    .day-pill.selected{background:var(--blue)}
    .day-pill.selected .dp-name{color:rgba(255,255,255,.7)}
    .day-pill.selected .dp-num{color:#fff}
    .day-pill.selected .dp-dot{background:rgba(255,255,255,.6)}

    /* ── Прогресс ── */
    .progress-bar-wrap{
      background:var(--bg2);padding:10px 16px;
      border-bottom:1px solid var(--sep);flex-shrink:0;
      display:flex;align-items:center;gap:12px;
    }

    .prog-bar-bg{
      flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;
    }
    .prog-bar-fg{
      height:100%;background:var(--blue);border-radius:3px;
      transition:width .6s cubic-bezier(.34,1.56,.64,1);
    }

    .prog-label{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap}
    .prog-sub{font-size:12px;color:var(--text3);white-space:nowrap}

    /* ── Скролл ── */
    .scroll{
      flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    }
    .scroll::-webkit-scrollbar{display:none}

    /* ── Секции ── */
    .section{padding:0 16px}
    .sec-hdr{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 0 6px;
    }
    .sec-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
    .clr-btn{
      background:none;border:none;color:var(--text3);font-size:12px;font-weight:500;
      cursor:pointer;font-family:inherit;padding:2px 6px;border-radius:6px;
      transition:color .2s
    }
    .clr-btn:hover{color:var(--red)}

    /* ── Часовой вид ── */
    .hour-block{padding:0 16px;margin-bottom:2px}

    .hour-label{
      font-size:12px;font-weight:600;color:var(--text3);
      padding:8px 0 4px;
      display:flex;align-items:center;gap:8px;
    }
    .hour-label::after{
      content:'';flex:1;height:1px;background:var(--sep)
    }

    /* ── Карточка задачи ── */
    .task{
      background:var(--card);border-radius:12px;
      padding:12px 14px;margin-bottom:6px;
      display:flex;align-items:center;gap:11px;
      box-shadow:0 1px 3px rgba(0,0,0,.06),0 0 0 1px var(--card-b);
      cursor:pointer;user-select:none;
      transition:transform .15s ease,opacity .3s ease;
      animation:fadeUp .25s ease both;
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:none}
    }
    .task:active{transform:scale(.99)}
    .task.done{opacity:.5}
    .task.done .t-text{text-decoration:line-through;color:var(--text2)}

    .cb{
      width:22px;height:22px;border-radius:50%;
      border:2px solid var(--text3);flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      transition:all .2s cubic-bezier(.34,1.56,.64,1);
      background:transparent;
    }
    .task.done .cb{background:var(--green);border-color:var(--green)}
    .cb-check{opacity:0;transform:scale(0);transition:all .2s cubic-bezier(.34,1.56,.64,1)}
    .task.done .cb-check{opacity:1;transform:scale(1)}

    .t-body{flex:1;min-width:0}
    .t-text{font-size:15px;font-weight:400;line-height:1.35;color:var(--text)}
    .t-time-badge{
      display:inline-flex;align-items:center;gap:3px;
      font-size:11px;font-weight:600;color:var(--blue);
      background:rgba(0,122,255,.1);border-radius:6px;
      padding:2px 6px;margin-top:4px;
    }

    /* ── Пустой день ── */
    .empty{
      text-align:center;padding:48px 32px;
    }
    .empty .ico{font-size:44px;margin-bottom:12px}
    .empty .et{font-size:17px;font-weight:600;margin-bottom:6px;color:var(--text)}
    .empty .es{font-size:14px;color:var(--text2);line-height:1.5}

    /* ══════════════════════════════════
       НИЖНИЙ БАР
    ══════════════════════════════════ */
    .bar{
      padding:10px 14px calc(var(--sb) + 10px);
      background:var(--bg2);
      border-top:1px solid var(--sep);
      flex-shrink:0;
    }

    .rec-bar{
      display:none;align-items:center;gap:10px;
      padding:8px 12px;background:rgba(255,59,48,.08);
      border-radius:10px;margin-bottom:8px;border:1px solid rgba(255,59,48,.15)
    }
    .rec-bar.on{display:flex}
    .rec-dot{width:7px;height:7px;border-radius:50%;background:var(--red);
      animation:blink 1s ease infinite;flex-shrink:0}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .rec-txt{font-size:13px;color:var(--red);font-weight:600;flex:1}
    .rec-time{font-size:13px;color:var(--red);font-variant-numeric:tabular-nums}
    .rec-stop{
      background:rgba(255,59,48,.15);border:none;border-radius:7px;
      color:var(--red);font-size:12px;font-weight:600;
      padding:4px 10px;cursor:pointer;font-family:inherit
    }

    .inp-row{display:flex;gap:8px;align-items:flex-end}

    .mic{
      width:40px;height:40px;border-radius:50%;background:var(--bg3);
      border:none;display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;color:var(--text2);
      transition:all .2s cubic-bezier(.34,1.56,.64,1);position:relative;
    }
    .mic.on{background:var(--red);color:#fff;transform:scale(1.07)}
    .mic.on::after{
      content:'';position:absolute;inset:-6px;border-radius:50%;
      border:2px solid var(--red);animation:ripple 1.1s ease-out infinite
    }
    @keyframes ripple{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.55)}}

    .inp-wrap{
      flex:1;background:var(--bg3);border-radius:20px;
      padding:9px 14px;display:flex;align-items:flex-end;gap:8px;
      transition:background .2s;
    }
    .inp-wrap:focus-within{background:#DCDCE0}

    #tinp{
      flex:1;background:none;border:none;outline:none;color:var(--text);
      font-size:15px;font-family:inherit;resize:none;
      max-height:120px;line-height:1.45;min-height:22px
    }
    #tinp::placeholder{color:var(--text3)}

    .send{
      width:28px;height:28px;border-radius:50%;background:var(--blue);
      border:none;display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;opacity:.3;
      transition:opacity .2s,transform .15s ease;
    }
    .send.on{opacity:1}
    .send:active{transform:scale(.9)}

    /* ══════════════════════════════════
       ТОСТ И УТИЛИТЫ
    ══════════════════════════════════ */
    .toast{
      position:fixed;top:calc(var(--st) + 52px);left:50%;
      transform:translateX(-50%) translateY(-12px);
      background:rgba(50,50,52,.95);color:#fff;
      backdrop-filter:blur(20px);border-radius:20px;
      padding:9px 18px;font-size:14px;font-weight:500;
      opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events:none;white-space:nowrap;z-index:999;
      max-width:calc(100vw - 40px);text-align:center;
    }
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

    .spin{
      width:14px;height:14px;border:2px solid rgba(0,0,0,.15);
      border-top-color:var(--blue);border-radius:50%;
      animation:rot .75s linear infinite;display:inline-block
    }
    @keyframes rot{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="app">

  <!-- ══ ВХОД ══ -->
  <div id="login">
    <div class="l-icon">🌅</div>
    <div style="text-align:center">
      <div class="l-title">Утренний план</div>
      <div class="l-sub" style="margin-top:8px">Голосом или текстом — разберу твой день по часам</div>
    </div>

    <div id="step-start">
      <button class="tg-login-btn" onclick="startAuth()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.94 8.19l-2.02 9.52c-.15.67-.54.83-1.09.52l-3-2.21-1.45 1.39c-.16.16-.3.3-.61.3l.22-3.08 5.6-5.06c.24-.22-.05-.34-.38-.12L6.27 14.4l-2.97-.93c-.64-.2-.66-.64.14-.95l11.6-4.47c.53-.2 1 .13.9.14z"/>
        </svg>
        Войти через Telegram
      </button>
    </div>

    <div id="step-wait">
      <div class="wait-card">
        <div class="wait-title">Подтверди вход в боте</div>
        <div class="wait-sub" style="margin-bottom:14px">Открой @plan_na_utro_bot и нажми Start — сайт войдёт автоматически</div>
        <a id="deeplink-btn" class="deeplink-btn" href="#" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.94 8.19l-2.02 9.52c-.15.67-.54.83-1.09.52l-3-2.21-1.45 1.39c-.16.16-.3.3-.61.3l.22-3.08 5.6-5.06c.24-.22-.05-.34-.38-.12L6.27 14.4l-2.97-.93c-.64-.2-.66-.64.14-.95l11.6-4.47c.53-.2 1 .13.9.14z"/>
          </svg>
          Открыть @plan_na_utro_bot
        </a>
      </div>
      <div class="polling-row">
        <span class="spin"></span>
        <span>Жду подтверждения…</span>
      </div>
      <button class="cancel-btn" onclick="cancelAuth()">Отмена</button>
    </div>

    <div class="l-hint">Задачи синхронизируются с <strong>@plan_na_utro_bot</strong></div>
  </div>

  <!-- ══ ГЛАВНЫЙ ══ -->
  <div id="main">

    <!-- Шапка -->
    <div class="hdr">
      <div class="hdr-top">
        <div class="hdr-left">
          <div class="hdr-greet" id="greet">Доброе утро</div>
          <div class="hdr-name" id="uname">—</div>
        </div>
        <div class="avatar" id="uavatar">👤</div>
      </div>
      <!-- Недельный стрип -->
      <div class="week-strip" id="week-strip"></div>
    </div>

    <!-- Прогресс выбранного дня -->
    <div class="progress-bar-wrap">
      <div class="prog-bar-bg">
        <div class="prog-bar-fg" id="progfg" style="width:0%"></div>
      </div>
      <span class="prog-label" id="proglabel">0 / 0</span>
      <span class="prog-sub" id="progsub"></span>
    </div>

    <!-- Задачи -->
    <div class="scroll" id="scroll">
      <div id="tasks-view"></div>
    </div>

    <!-- Нижний бар -->
    <div class="bar">
      <div class="rec-bar" id="recbar">
        <div class="rec-dot"></div>
        <span class="rec-txt">Запись…</span>
        <span class="rec-time" id="rectm">0:00</span>
        <button class="rec-stop" onclick="stopRec()">Стоп</button>
      </div>
      <div class="inp-row">
        <button class="mic" id="micbtn" onclick="toggleRec()">
          <svg width="18" height="22" viewBox="0 0 18 22" fill="currentColor">
            <rect x="5" y="0" width="8" height="13" rx="4"/>
            <path d="M1 9c0 4.4 3.6 8 8 8s8-3.6 8-8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            <line x1="9" y1="17" x2="9" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="6" y1="21" x2="12" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="inp-wrap">
          <textarea id="tinp" rows="1" placeholder="Что планируешь?"
            oninput="onInp(this)" onkeydown="onKD(event)"></textarea>
          <button class="send" id="sendbtn" onclick="sendText()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M12 20V4M12 4L5 11M12 4L19 11"
                stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
// ─── Стейт ────────────────────────────────────────────
let TOKEN = localStorage.getItem('tok') || '';
let USER  = JSON.parse(localStorage.getItem('usr') || 'null');
let allTasks = [];        // задачи выбранного дня
let weekTaskMap = {};     // { 'YYYY-MM-DD': count } — кол-во задач за неделю
let selectedDay = todayStr();
let pollTimer = null, authToken = null;
let mr = null, chunks = [], recTmr = null, recSec = 0, busy = false;

// ─── Утилиты дат ─────────────────────────────────────
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function getWeekDays() {
  const today = new Date();
  const dow = today.getDay(); // 0=вс
  const mon = new Date(today);
  mon.setDate(today.getDate() - ((dow + 6) % 7)); // Пн текущей недели
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    days.push(d.toISOString().slice(0, 10));
  }
  return days;
}

function formatDayLabel(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const dn = ['вс','пн','вт','ср','чт','пт','сб'];
  return { name: dn[d.getDay()], num: d.getDate() };
}

function greetText() {
  const h = new Date().getHours();
  if (h < 5)  return 'Доброй ночи,';
  if (h < 12) return 'Доброе утро,';
  if (h < 17) return 'Добрый день,';
  return 'Добрый вечер,';
}

// ─── Инициализация ───────────────────────────────────
window.addEventListener('load', () => {
  if (TOKEN && USER) showMain();
});

// ─── Deep-link Auth ──────────────────────────────────
async function startAuth() {
  try {
    const r = await fetch('/api/auth-session', { method: 'POST' });
    const d = await r.json();
    if (!d.token) throw new Error('no token');
    authToken = d.token;
    document.getElementById('step-start').style.display = 'none';
    const sw = document.getElementById('step-wait');
    sw.style.display = 'flex';
    document.getElementById('deeplink-btn').href =
      `https://t.me/plan_na_utro_bot?start=auth_${d.token}`;
    pollTimer = setInterval(pollAuth, 2000);
  } catch(e) { toast('Ошибка: ' + e.message); }
}

async function pollAuth() {
  if (!authToken) return;
  try {
    const r = await fetch('/api/auth-session?token=' + authToken);
    const d = await r.json();
    if (d.pending) return;
    if (d.token) {
      clearInterval(pollTimer);
      TOKEN = d.token; USER = d.user;
      localStorage.setItem('tok', TOKEN);
      localStorage.setItem('usr', JSON.stringify(USER));
      showMain();
    }
  } catch {}
}

function cancelAuth() {
  clearInterval(pollTimer); authToken = null;
  document.getElementById('step-wait').style.display = 'none';
  document.getElementById('step-start').style.display = 'block';
}

// ─── Показать главный экран ──────────────────────────
function showMain() {
  document.getElementById('login').style.display = 'none';
  const m = document.getElementById('main');
  m.style.display = 'flex';
  document.getElementById('greet').textContent = greetText();
  document.getElementById('uname').textContent = USER.first_name || 'Привет!';
  const av = document.getElementById('uavatar');
  if (USER.photo_url) av.innerHTML = `<img src="${USER.photo_url}" alt="">`;
  else av.textContent = (USER.first_name || '?')[0].toUpperCase();
  buildWeekStrip();
  loadWeekMeta();
}

// ─── Недельный стрип ─────────────────────────────────
function buildWeekStrip() {
  const strip = document.getElementById('week-strip');
  strip.innerHTML = '';
  const today = todayStr();
  getWeekDays().forEach(day => {
    const { name, num } = formatDayLabel(day);
    const pill = document.createElement('div');
    pill.className = 'day-pill' +
      (day === today ? ' today' : '') +
      (day === selectedDay ? ' selected' : '');
    pill.dataset.day = day;
    pill.innerHTML = `
      <span class="dp-name">${name}</span>
      <span class="dp-num">${num}</span>
      <span class="dp-dot"></span>`;
    pill.onclick = () => selectDay(day);
    strip.appendChild(pill);
  });
}

async function loadWeekMeta() {
  const days = getWeekDays();
  const r = await apiCall('GET', `/api/tasks?week=true&days=${days.join(',')}`);
  if (!r) return;
  weekTaskMap = {};
  (r.tasks || []).forEach(t => {
    weekTaskMap[t.day] = (weekTaskMap[t.day] || 0) + 1;
  });
  // Обновить точки
  document.querySelectorAll('.day-pill').forEach(el => {
    const d = el.dataset.day;
    el.classList.toggle('has-tasks', !!(weekTaskMap[d]));
  });
  // Загрузить выбранный день
  loadDay(selectedDay);
}

function selectDay(day) {
  selectedDay = day;
  document.querySelectorAll('.day-pill').forEach(el => {
    el.classList.toggle('selected', el.dataset.day === day);
  });
  loadDay(day);
}

// ─── Загрузка задач дня ───────────────────────────────
async function loadDay(day) {
  const r = await apiCall('GET', `/api/tasks?day=${day}`);
  if (r?.tasks) renderDay(r.tasks);
}

// ─── Рендер дня (часовой вид) ────────────────────────
function renderDay(tasks) {
  allTasks = tasks;
  const done  = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const pct   = total ? Math.round(done / total * 100) : 0;

  document.getElementById('progfg').style.width = pct + '%';
  document.getElementById('proglabel').textContent = `${done} / ${total}`;
  document.getElementById('progsub').textContent =
    total === 0 ? '' : done === total ? '🎉 Всё!' : `${pct}%`;

  const view = document.getElementById('tasks-view');

  if (total === 0) {
    const isToday = selectedDay === todayStr();
    view.innerHTML = `<div class="empty">
      <div class="ico">${isToday ? '🌅' : '📅'}</div>
      <div class="et">${isToday ? 'День чистый' : 'Нет задач'}</div>
      <div class="es">${isToday
        ? 'Нажми микрофон или напиши планы — разберу по часам'
        : 'Задачи для этого дня не добавлены'}</div>
    </div>`;
    return;
  }

  // Группируем по часу
  const withTime    = tasks.filter(t => t.time);
  const withoutTime = tasks.filter(t => !t.time);

  // Собираем уникальные часы
  const hourMap = {};
  withTime.forEach(t => {
    const h = t.time.slice(0, 2);
    (hourMap[h] = hourMap[h] || []).push(t);
  });

  const sorted = Object.keys(hourMap).sort();

  let html = '';

  // Секция «Без времени»
  if (withoutTime.length) {
    html += `<div class="section">
      <div class="sec-hdr">
        <span class="sec-title">Без времени</span>
        <button class="clr-btn" onclick="clearDay()">Очистить день</button>
      </div>`;
    withoutTime.forEach((t, i) => {
      const idx = tasks.indexOf(t) + 1;
      html += taskCard(t, idx);
    });
    html += `</div>`;
  } else {
    html += `<div class="section"><div class="sec-hdr">
      <span class="sec-title">Задачи дня</span>
      <button class="clr-btn" onclick="clearDay()">Очистить</button>
    </div></div>`;
  }

  // Часовые блоки
  sorted.forEach(h => {
    const label = h + ':00';
    html += `<div class="hour-block">
      <div class="hour-label">${label}</div>`;
    hourMap[h].forEach(t => {
      const idx = tasks.indexOf(t) + 1;
      html += taskCard(t, idx);
    });
    html += `</div>`;
  });

  view.innerHTML = html;

  // Делегирование кликов
  view.querySelectorAll('.task').forEach(el => {
    el.addEventListener('click', () => toggleTask(+el.dataset.idx));
  });
}

function taskCard(t, idx) {
  const done = t.done;
  const time = t.time
    ? `<div class="t-time-badge">🕐 ${esc(t.time)}</div>` : '';
  return `<div class="task${done ? ' done' : ''}" data-idx="${idx}" style="animation-delay:${(idx-1)*.03}s">
    <div class="cb">
      <svg class="cb-check" width="11" height="8" viewBox="0 0 11 8" fill="none">
        <path d="M1 4L4 7L10 1" stroke="white" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="t-body">
      <div class="t-text">${esc(t.text)}</div>
      ${time}
    </div>
  </div>`;
}

// ─── Тогл задачи ─────────────────────────────────────
async function toggleTask(idx) {
  if (busy) return;
  const t = allTasks[idx - 1];
  if (!t || t.done) return;
  busy = true;
  t.done = true;
  renderDay(allTasks);
  const r = await apiCall('PATCH', '/api/tasks', { taskNum: idx, day: selectedDay });
  busy = false;
  if (r?.tasks) {
    renderDay(r.tasks);
    updateWeekDot(selectedDay, r.tasks);
  }
}

// ─── Очистить день ───────────────────────────────────
async function clearDay() {
  if (!confirm('Очистить все задачи за этот день?')) return;
  const r = await apiCall('DELETE', `/api/tasks?day=${selectedDay}`);
  if (r) { renderDay([]); weekTaskMap[selectedDay] = 0; updateWeekDot(selectedDay, []); }
  toast('Очищено 🗑');
}

function updateWeekDot(day, tasks) {
  weekTaskMap[day] = tasks.length;
  document.querySelectorAll('.day-pill').forEach(el => {
    if (el.dataset.day === day)
      el.classList.toggle('has-tasks', tasks.length > 0);
  });
}

// ─── Текстовый ввод ───────────────────────────────────
function onInp(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('sendbtn').classList.toggle('on', el.value.trim().length > 0);
}
function onKD(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
}
async function sendText() {
  const el = document.getElementById('tinp');
  const text = el.value.trim();
  if (!text || busy) return;
  el.value = ''; el.style.height = 'auto';
  document.getElementById('sendbtn').classList.remove('on');
  await process(text, null);
}

// ─── Голос ────────────────────────────────────────────
async function toggleRec() {
  if (mr && mr.state === 'recording') stopRec();
  else startRec();
}
async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chunks = [];
    const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    mr = new MediaRecorder(stream, { mimeType: mime });
    mr.ondataavailable = e => chunks.push(e.data);
    mr.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      await process(null, new Blob(chunks, { type: mime }));
    };
    mr.start();
    document.getElementById('micbtn').classList.add('on');
    document.getElementById('recbar').classList.add('on');
    recSec = 0;
    recTmr = setInterval(() => {
      recSec++;
      const m = Math.floor(recSec / 60), s = recSec % 60;
      document.getElementById('rectm').textContent = m + ':' + String(s).padStart(2,'0');
      if (recSec >= 90) stopRec();
    }, 1000);
  } catch { toast('Нет доступа к микрофону 🎙'); }
}
function stopRec() {
  if (mr) mr.stop(); clearInterval(recTmr);
  document.getElementById('micbtn').classList.remove('on');
  document.getElementById('recbar').classList.remove('on');
}

// ─── Обработка ввода ─────────────────────────────────
async function process(text, blob) {
  if (busy) return;
  busy = true;
  toast(blob ? '🎧 Распознаю…' : '🤔 Разбираю задачи…');
  try {
    let body;
    if (blob) {
      const ab = await blob.arrayBuffer();
      const bytes = new Uint8Array(ab);
      let bin = '';
      for (let i = 0; i < bytes.length; i += 8192)
        bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
      body = { audioBase64: btoa(bin), mimeType: blob.type, day: selectedDay };
    } else {
      body = { text, day: selectedDay };
    }
    const d = await apiCall('POST', '/api/tasks', body);
    if (!d) { busy = false; return; }
    if (d.error) { toast('⚠️ ' + d.error); busy = false; return; }
    if (d.transcribed) toast('📝 «' + d.transcribed.slice(0, 55) + (d.transcribed.length > 55 ? '…' : '') + '»');
    else toast('✅ Задачи добавлены');
    if (d.tasks) { renderDay(d.tasks); updateWeekDot(selectedDay, d.tasks); }
  } catch(e) { toast('Ошибка: ' + e.message); }
  busy = false;
}

// ─── API ─────────────────────────────────────────────
async function apiCall(method, path, body) {
  const opts = { method, headers: { Authorization: 'Bearer ' + TOKEN } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(path, opts);
  if (r.status === 401) { localStorage.clear(); location.reload(); return null; }
  return r.json();
}

// ─── Утилиты ─────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTmr;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.classList.remove('on'), 3000);
}
</script>
